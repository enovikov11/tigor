  p-llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: bench-vllm
    restart: unless-stopped
    command: >-
      -m /huggingface.co/AlexWortega/SIQ-1-35B/gguf/SIQ-1-35B.Q4_K_M.gguf
      --alias siq-1-35b
      -ngl 99
      -c 131072
      -np 1
      --jinja
      --host 0.0.0.0
      --port 8000
    devices:
      - nvidia.com/gpu=all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - /ssd/internet/huggingface.co:/huggingface.co:ro
    shm_size: 16g
    security_opt:
      - no-new-privileges:true
    networks: [bench-internal]

  p-opencode:
    build:
      context: ./opencode
      dockerfile: Dockerfile
    image: bench-opencode:local
    container_name: bench-opencode
    restart: unless-stopped
    depends_on: [p-llamacpp]
    working_dir: /monorepo-rw
    volumes:
      # Canonical monorepo, read-only — agent reads AGENTS.md + docs here.
      - ~/monorepo:/monorepo-ro:ro
      # Read-write working copy — all edits and commits happen here.
      - ~/monorepo-loop:/monorepo-rw
      # Loop state persists across iterations (slot table, driver log).
      - ~/loop-state:/loop-state
    environment:
      HOME: /root
      GIT_AUTHOR_NAME: opencode-bench
      GIT_AUTHOR_EMAIL: opencode-bench@localhost
      GIT_COMMITTER_NAME: opencode-bench
      GIT_COMMITTER_EMAIL: opencode-bench@localhost
    security_opt:
      - no-new-privileges:true
    networks: [bench-internal]

networks:
  bench-internal:
    internal: true
